name: Publish front

on:
  push:
    tags: ['v*']              # срабатываем на тег вида  v1.0.0, v1.0.1 …

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - uses: actions/checkout@v4

      # 2. Ставим Node 24
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. Ставим зависимости (vite, fast-glob, supabase-js …)
      - name: Install deps
        run: npm install

      # 4. Сборка фронта в папку dist/
      - name: Build front
        run: npm run build

      # 5. Публикуем релиз в Supabase и обновляем таблицу settings
      - name: Upload to Supabase
        env:
          SUPA_URL: ${{ secrets.SUPA_URL }}            # https://xyz.supabase.co
          SUPA_SERVICE_KEY: ${{ secrets.SUPA_SERVICE_KEY }}
          NEW_VER: ${{ github.ref_name }}              # v1.0.0 → берём как есть
        run: |
          node - <<'NODE'
          import { createClient } from '@supabase/supabase-js';
          import fg from 'fast-glob';
          import fs from 'fs/promises';

          const url   = process.env.SUPA_URL;
          const key   = process.env.SUPA_SERVICE_KEY;
          const ver   = process.env.NEW_VER.replace(/^v/, '');   // 1.0.0
          const supa  = createClient(url, key);

          // Загружаем все файлы из dist/  ➜  bucket releases/<ver>/
          for (const file of await fg('**/*', { cwd: 'dist', dot: true })) {
            const data = await fs.readFile(`dist/${file}`);
            await supa.storage.from('releases')
              .upload(`releases/${ver}/${file}`, data, { upsert: true });
            console.log('uploaded', file);
          }

          // Обновляем таблицу settings
          await supa.from('settings')
            .update({ front_version: ver, release_path: `releases/${ver}` })
            .eq('id', true);

          console.log('✅ Supabase updated to version', ver);
          NODE
