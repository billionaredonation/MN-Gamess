name: Publish front

on:
  push:
    tags: ['v*']               # срабатываем на теги v1.0.0, v1.0.1 …

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ————————————————— 1. Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v4

      # ————————————————— 2. Ставим Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ————————————————— 3. Ставим зависимости
      - name: Install deps
        run: npm install

      # ————————————————— 4. Собираем фронт
      - name: Build
        run: npm run build            # после этого папка dist/ готова

      # ————————————————— 5. Заливаем в Supabase
      - name: Upload to Supabase
        env:
          SUPA_URL: ${{ secrets.SUPA_URL }}
          SUPA_SERVICE_KEY: ${{ secrets.SUPA_SERVICE_KEY }}
          NEW_VER: ${{ github.ref_name }}          # v1.0.7 → передаём как есть
        run: |
          node <<'NODE'
          import { createClient } from '@supabase/supabase-js';
          import fg  from 'fast-glob';
          import fs  from 'fs/promises';
          import { fileTypeFromBuffer } from 'file-type';

          const ver  = process.env.NEW_VER.replace(/^v/, '');       // 1.0.7
          const supa = createClient(process.env.SUPA_URL,
                                    process.env.SUPA_SERVICE_KEY);

          function mime(name, buf) {
            if (name.endsWith('.html')) return 'text/html';
            if (name.endsWith('.js'))   return 'text/javascript';
            if (name.endsWith('.css'))  return 'text/css';
            return fileTypeFromBuffer(buf)?.mime || 'application/octet-stream';
          }

          for (const f of await fg('**/*', { cwd: 'dist', dot: true })) {
            const data = await fs.readFile(`dist/${f}`);
            await supa.storage.from('releases')
              .upload(`releases/${ver}/${f}`, data,
                      { upsert: true, contentType: mime(f, data) });
            console.log('uploaded', f);
          }

          await supa.from('settings')
            .update({ front_version: ver,
                      release_path: `releases/${ver}` })
            .eq('id', true);

          console.log('✅ switched to', ver);
          NODE
