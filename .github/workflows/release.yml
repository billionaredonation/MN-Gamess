jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4          # остаётся
        with: { node-version: 24 }           # можно 20, но 24 — без предупреждений

      # ➜ ДОБАВЬТЕ ЭТОТ ШАГ
      - name: Install deps
        run: npm install                     # ставит vite и всё остальное

      - name: Build front
        run: npm run build                   # теперь vite есть, сборка пройдёт
